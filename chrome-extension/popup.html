<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TimeVault - Save Page</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="logo">
        <div class="logo-icon">🧠</div>
        <h1>TimeVault</h1>
      </div>
      <div class="status-indicator" id="statusIndicator"></div>
    </div>

    <!-- Page Preview -->
    <div class="page-preview" id="pagePreview">
      <div class="page-title" id="pageTitle">Loading...</div>
      <div class="page-url" id="pageUrl">Analyzing page...</div>
      <div class="page-description" id="pageDescription">
        Extracting content and generating AI summary...
      </div>
    </div>

    <!-- Save Options -->
    <div class="save-options">
      <div class="option-group">
        <label class="option">
          <input type="checkbox" id="includeContent" checked>
          <span class="checkmark"></span>
          Include page content for AI analysis
        </label>

        <label class="option">
          <input type="checkbox" id="includeImages" checked>
          <span class="checkmark"></span>
          Extract main images
        </label>
      </div>
    </div>

    <!-- Actions -->
    <div class="actions">
      <button class="btn-primary" id="saveBtn">
        <span class="btn-icon">💾</span>
        Save to Vault
      </button>

      <button class="btn-secondary" id="viewVaultBtn">
        <span class="btn-icon">🗄️</span>
        Open Vault
      </button>
    </div>

    <!-- Progress -->
    <div class="progress-container" id="progressContainer" style="display: none;">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-text" id="progressText">Saving to TimeVault...</div>
    </div>

    <!-- Success Message -->
    <div class="success-message" id="successMessage" style="display: none;">
      <div class="success-icon">✨</div>
      <div class="success-text">Saved to TimeVault!</div>
      <div class="success-subtitle">AI analysis complete</div>
    </div>

    <!-- Error Message -->
    <div class="error-message" id="errorMessage" style="display: none;">
      <div class="error-icon">⚠️</div>
      <div class="error-text">Failed to save</div>
      <div class="error-subtitle" id="errorSubtitle">Check TimeVault connection</div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
