spring.config.import=optional:classpath:db.properties

spring.datasource.url=jdbc:sqlserver://${db.server}:${db.port};databaseName=${db.database};encrypt=true;trustServerCertificate=${db.trustServerCertificate:true}
spring.datasource.username=${db.user}
spring.datasource.password=${db.password}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=true

# Vaadin Configuration
vaadin.launch-browser=true
server.port=8081

# Gemini AI Configuration
gemini.api.key=AIzaSyBoNPRhLSHJn6BFLMt6fZeNqTDWNn-jwrc
gemini.model=gemini-2.5-flash

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Storage path for uploaded files
timevault.storage.path=${user.home}/.timevault/uploads
